name: Deploy to Server

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute Server Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            cd /home/digitaldot/htdocs/digitaldot.ro
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Build the Next.js application
            npm run build
            
            # Restart the Node app (CloudPanel usually uses the domain name for the PM2 process)
            pm2 restart digitaldot.ro
            
            echo "Deployment finished!"