name: Deploy to Server

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute Server Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # Source profile/bashrc to load NVM/Node paths in non-interactive SSH session
            source ~/.bash_profile || source ~/.bashrc || true
            export PATH=$PATH:/usr/local/bin:/usr/bin

            cd /home/digitaldot/htdocs/digitaldot.ro
            
            # Fetch and hard reset to avoid merge conflicts with local server files
            git fetch origin
            git reset --hard origin/main
            
            # Install dependencies cleanly
            npm ci
            
            # Build the Next.js application
            npm run build
            
            # Restart the Node app
            pm2 restart digitaldot.ro
            
            echo "Deployment finished!"