name: Deploy to Server

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Execute Server Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # Load NVM explicitly to make npm and pm2 available
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin

            cd /home/digitaldot/htdocs/digitaldot.ro
            
            # Fetch and hard reset to avoid merge conflicts with local server files
            git fetch origin
            git reset --hard origin/main
            
            # Install dependencies cleanly
            npm ci
            
            # Build the Next.js application
            npm run build
            
            # Restart the Node app
            pm2 restart digitaldot.ro
            
            echo "Deployment finished!"